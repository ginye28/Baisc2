<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            a {
                text-decoration: none;
            }
            a:link {
                color: aqua;
            }
            a:visited {
                color: red;
            }
            .btn {
                display: inline-block;
                border: 1px solid #777;
                border-radius: 2.5px;
                padding: 2px 7px;
                background-color: #eee;
                font-size: 13.3333px;
                color: black;
                cursor: default;
            }
            .btn:hover{
                border: 1px solid #555;
                background-color: #ddd;
            }
            .btn:active {
                border: 1px solid #aaa;
                background-color: #f0f0f0;
            }
            .btn:disabled {
                border: #ddd;
                background-color: #be0000;
            }
        </style>
    </head>
    <body>
        <div>
            <a class="btn" href="http://naver.com">확인</a>
            <button class="btn" disabled>확인</button>
            <div class="btn">확인</div>
        </div>
    </body>
</html>
