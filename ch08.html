<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body {
                margin: 0;
                height: 100vh;
                background-image: url("./images/bg.jpg");
                background-repeat: no-repeat;
                background-position: center;
                background-size: cover;
                background-attachment: fixed;
            }
            .container {
                /* display: flex;
                flex-direction: column; */
                margin: auto;
                box-sizing: border-box;
                width: 1200px;
                height: 600px;
                background-color: linear-gradient(90deg,rgba(42, 155, 153, 1) 0%, rgba(227, 143, 195, 1) 49%, rgba(83, 232, 237, 1) 100%);
                overflow-y: hidden;
            }
            .profile-image {
                margin: 50px auto;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 50%;
                width: 100px;
                height: 100px;
                box-shadow: 0 0 10px 5px #00000044;
                background-image: url("./images/default-profile.jpg");
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="profile-image"></div>
            <div class="profile-image"></div>
            <div class="profile-image"></div>
            <div class="profile-image"></div>
            <div class="profile-image"></div>
            <div class="profile-image"></div>
        </div>
    </body>
</html>
