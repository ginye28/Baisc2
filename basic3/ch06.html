<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            html, body {
                margin: 0;
                height: 100vh;
            }

            .container {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                margin: 0 auto;
                width: 1200px;
                height: 100%;
                overflow: auto;
            }

            .card {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
                box-shadow: 0 0 5px #00000044;
                padding: 20px;
            }
            .input-box {
                position: relative;
                margin-bottom: 15px;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 4px;
                padding: 5px 10px;
                width: 360px;
                height: 50px;
                overflow: hidden;

                & > label {
                    transition: all 0.3 ease-in-out;
                    transform: translateY(-50%);
                    position: absolute;
                    top: 50%;
                    left: 10px;
                    background-color: transparent;
                    font-size: 14px;
                    color: #444;
                }

                & > input {
                    transition: all 0.3 ease-in-out;
                    position: relative;
                    z-index: 10;
                    outline: none;
                    border: none;
                    width: 100%;
                    height: 100%;
                    background-color: #00000000;
                }
            }

            .input-is-not-empty {
                & > label {
                    font-size: 12px;
                    top: 25%;
                }
                & > input {
                    top: 30%;
                    height: 80%;
                }
            }

            .register-button {
                display: flex;
                justify-content: center;
                align-items: center;
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                border-radius: 4px;
                width: 100%;
                height: 40px;
                background-color: #006caf;
                color: #fafafa;
                cursor: pointer;

                &:hover {
                    background-color: #005489;
                }

                &:active {
                    background-color: #003e65;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="card">
                <div class="input-box">
                    <input type="text" id="un" name="username">
                    <label for="un">사용자 이름</label>
                </div>
                <div class="input-box">
                    <input type="password" id="pw" name="password">
                    <label for="pw">비밀번호</label>
                </div>
                <button class="register-button">사용자 정보 등록</button>
            </div>
        </div>

        <script>
            let userList = [];

            function autoIncrement() {
                let currentId = 0;

                return function() {
                    currentId++;
                    return currentId;
                }
            }

            const getNewId = autoIncrement();

            const inputBoxs = document.querySelectorAll(".input-box");
            //       array                      all일 때

            for (let inputBox of inputBoxs) {
                const inputElements = inputBox.querySelector("input");
                //      object                    all 아닐때

                inputElements.onfocus = (event) => {    //이벤트 함수 호출 on 붙으면 모두 이벤트
                    inputBox.classList.add("input-is-not-empty");
                }

                inputElements.onblur = (event) => {    //이벤트 함수 호출
                    if(!event.target.value) {
                        inputBox.classList.remove("input-is-not-empty")
                    }
                }
            }

            const registerButton = document.querySelector(".register-button");
            registerButton.onclick = () => {
                const inputs = Array.form(inputBoxs).map(inputBox => inputBox.querySelector("input"));
                let newUser = {
                    id: getNewId(),
                }

                inputs.from(inputs).forEach(element => {
                    const {name, value} = element;
                    newUser = {
                        ...newUser,
                        [name]: value,
                    }
                });
                userList = [
                    ...userList,
                    newUser,
                    // {
                    //     id: getNewId(),
                    //     [inputs[0].name]: inputs[0].value,
                    //     password: inputs[1].value,
                    // }
                ];
                console.log(userList);
            }
        </script>
    </body>
</html>
