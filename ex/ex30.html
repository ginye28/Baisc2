<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            body{
                height: 100vh;
                margin: 0;
                background-color: #f0f0f0;
            }
            .login-box {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50% 50%);
                width: 400px;
                padding: 40px;
                background-color: white;
                border: 1px solid #ddd;
                border-radius: 12px;
            }
            input {
                width: 100%;
                padding: 12px;
                margin-bottom: 15px;
                box-sizing: border-box;
            }
            button {
                width: 100%;
                padding: 14px;
                background-color: #065A82;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 16px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <header>
            <div>
                <h1 class="login-box">로그인</h1>
            </div>
            <div>
                <input type="Id">
                <input type="password">
            </div>
            <div>
                <input type="checkbox">
                <label for="chk1">아이디 기억하기</label>
            </div>
            <button type="submit">로그인하기</button>
            <div>
                <p>계정이 없으신가요?</p><p>회원가입</p>
            </div>
        </header>
    </body>
</html>
