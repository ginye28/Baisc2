<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            th{
                border: 1px solid #ddd;
                border-collapse: collapse;
                background-color: #333;
                color: white;
                padding: 12px;
            }
            td{
                padding: 10px;
                justify-content: right;
            }
            .total {
                background-color: #f5f5f5;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <table>
            <tr>
                <th>상품명</th>
                <th>가격</th>
                <th>수량</th>
                <th>합계</th>
            </tr>
            <tr>
                <td>노트북</td>
                <td>1,200,000</td>
                <td>1</td>
                <td>1,200,000</td>
            </tr>
            <tr>
                <td>마우스</td>
                <td>35,000</td>
                <td>2</td>
                <td>70,000</td>
            </tr>
            <tr>
                <td>키보드</td>
                <td>55,000</td>
                <td>1</td>
                <td>55,000</td>
            </tr>
            <tr class="total">
                <td></td>
                <td></td>
                <td></td>
                <td>총합: 1,325,000</td>
            </tr>
        </table>
    </body>
</html>
