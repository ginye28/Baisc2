<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .parent{
                position: relative;
                width: 400px;
                height: 300px;
                border: 2px solid black;
            }
            .child {
                position: absolute;
                right: 10px;
                bottom: 10px;
            }
        </style>
    </head>
    <body>
        <div class="parent">
            <div class="child">여기!</div>
        </div>
    </body>
</html>

<!-- relative가 없으면 칸 밖으로 나온다. -->
