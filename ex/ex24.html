<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            form {
                width: 400px;
                margin: auto;
                padding: 30px;
                background-color: #f9f9f9;
                border: 1px solid #ddd;
            }
            input {
                width: 100%;
                padding: 10px;
                margin-bottom: 15px;
                box-sizing: border-box;
                border: 1px solid #ccc;
            }
            button {
                background-color: #f97316;
                color: white;
                padding: 12px 0;
                width: 100%;
                border: none;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <form action="/signin" method="post">
            <div>
                <label for="name">이름</label>
                <input type="text" name="name">
            </div>
            <div>
                <label for="email">이메일</label>
                <input type="email" name="email">
            </div>
            <div>
                <label for="password">비밀번호</label>
                <input type="password" name="password">
            </div>
            <div>
                <label for="date">생년월일</label>
                <input type="date" name="date">
            </div>
            <div>
                <label for="title">성별</label>
                <label for="radio">남자</label>
                <input type="radio" name="radio">
                <label for="radio">여자</label>
                <input type="radio" name="radio">
            </div>
            <div>
                <label for="title">관심분야</label>
                <label for="checkbox">Java</label>
                <input type="checkbox" name="checkbox">
                <label for="checkbox">Python</label>
                <input type="checkbox" name="checkbox">
                <label for="checkbox">JavaScript</label>
                <input type="checkbox" name="checkbox">
            </div>
            <div>
                <label for="textarea">자기소개</label>
                <div>
                    <textarea text=""></textarea>
                </div>
            </div>
            <button type="submit">가입하기</button>
        </form>
    </body>
</html>
