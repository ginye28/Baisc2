<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            .box-a {
                width: 200px;
                padding: 20px;
                border: 5px solid black;
                box-sizing: content-box;  /* 기본값 */
            }
            .box-b {
                width: 200px;
                padding: 20px;
                border: 5px solid black;
                box-sizing: border-box;
            }
        </style>
    </head>
    <body>
        <div class="box-a"></div>
        <div class="box-b"></div>
    </body>
</html>

a w: 250px
b w: 200px
